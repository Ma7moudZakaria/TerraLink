name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/terralink-api

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Authenticate GitHub Packages
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore TerraLink.sln

      - name: Build
        run: dotnet build TerraLink.sln --no-restore --configuration Release

  docker:
    name: Build, Tag & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Authenticate GitHub Packages
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: tags
        run: |
          IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=${GITHUB_REF##*/}
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)

          TAGS="${IMAGE_NAME}:${BRANCH}"
          TAGS="${TAGS},${IMAGE_NAME}:${BRANCH}-${SHA}"
          TAGS="${TAGS},${IMAGE_NAME}:${BRANCH}-${TIMESTAMP}"

          if [ "$BRANCH" = "main" ]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${TAGS}"

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/TerraLink.API/Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            NUGET_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
